
<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Aspirasi OSIS</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#f4f6fb;
padding:40px;
}

h1{
text-align:center;
margin-bottom:20px;
}

/* statistik */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
}

.stat{
background:white;
padding:15px 25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
font-weight:bold;
}

/* search */

.search{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.search input{
width:300px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* filter */

.filters{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.filters button{
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#ddd;
}

.filters button:hover{
background:#ccc;
}

/* container */

.container{
max-width:800px;
margin:auto;
}

/* card */

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.tanggal{
font-size:13px;
color:#666;
margin-bottom:6px;
}

.jenis{
font-weight:bold;
margin-bottom:6px;
}

.saran{
color:#2a8d08;
}

.keluhan{
color:#e74c3c;
}

/* tombol */

.actions{
margin-top:10px;
}

.copy{
background:#3498db;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.topbtn{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.deleteAll{
background:#e74c3c;
border:none;
color:white;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Dashboard Aspirasi OSIS</h1>

<!-- statistik -->

<div class="stats">

<div class="stat">Total : <span id="total">0</span></div>
<div class="stat">Saran : <span id="saran">0</span></div>
<div class="stat">Keluhan : <span id="keluhan">0</span></div>

</div>

<!-- search -->

<div class="search">
<input type="text" id="search" placeholder="Cari aspirasi...">
</div>

<!-- filter -->

<div class="filters">
<button onclick="filterJenis('all')">Semua</button>
<button onclick="filterJenis('Saran')">Saran</button>
<button onclick="filterJenis('Keluhan')">Keluhan</button>
</div>

<!-- hapus semua -->

<div class="topbtn">
<button onclick="hapusSemua()" class="deleteAll">
Hapus Semua Aspirasi
</button>
</div>

<!-- list aspirasi -->

<div class="container" id="list"></div>

<script>

if(localStorage.getItem("adminLogin")!=="true"){
window.location.href="login.html";
}

const url="https://script.google.com/macros/s/AKfycbz423LIrPISp4nnH4HYu1_Ry40cSO5RKeuWwac1odnOSOvxKWyhxx3iyVGlUzBtduF9/exec";

let semuaData=[];

/* format tanggal */

function formatTanggal(tanggal){

let t=new Date(tanggal);

let bulan=[
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

let hari=t.getDate();
let namaBulan=bulan[t.getMonth()];
let tahun=t.getFullYear();

let jam=String(t.getHours()).padStart(2,"0");
let menit=String(t.getMinutes()).padStart(2,"0");

return hari+" "+namaBulan+" "+tahun+" • "+jam+":"+menit;

}

/* ambil data */

fetch(url)
.then(res=>res.json())
.then(data=>{

semuaData=data.reverse();

renderData(semuaData);
hitungStatistik();

})
.catch(err=>{

document.getElementById("list").innerHTML="Gagal memuat data";
console.log(err);

});

/* render card */

function renderData(data){

let list=document.getElementById("list");

list.innerHTML="";

data.forEach(row=>{

let jenisClass=row[1]=="Keluhan"?"keluhan":"saran";

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="tanggal">${formatTanggal(row[0])}</div>

<div class="jenis ${jenisClass}">
${row[1]}
</div>

<p>${row[2]}</p>

<div class="actions">
<button class="copy" onclick="copyText('${row[2]}')">
Salin
</button>
</div>

`;

list.appendChild(card);

});

}

/* statistik */

function hitungStatistik(){

let saran=0;
let keluhan=0;

semuaData.forEach(row=>{

if(row[1]=="Saran") saran++;
if(row[1]=="Keluhan") keluhan++;

});

document.getElementById("total").innerText=semuaData.length;
document.getElementById("saran").innerText=saran;
document.getElementById("keluhan").innerText=keluhan;

}

/* filter */

function filterJenis(jenis){

if(jenis=="all"){
renderData(semuaData);
return;
}

let hasil=semuaData.filter(row=>row[1]==jenis);

renderData(hasil);

}

/* search */

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase();

let hasil=semuaData.filter(row=>
row[2].toLowerCase().includes(keyword)
);

renderData(hasil);

});

/* copy */

function copyText(text){

navigator.clipboard.writeText(text);

alert("Aspirasi disalin");

}

/* hapus semua */

function hapusSemua(){

if(confirm("Hapus semua aspirasi?")){

fetch(url+"?deleteAll=true")
.then(()=>{

alert("Semua aspirasi dihapus");
location.reload();

});

}

}

</script>

</body>
</html>
```
