
<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Aspirasi OSIS</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

/* BACKGROUND ANIMASI */

body{
min-height:100vh;
padding:40px;

background:linear-gradient(270deg,#9bafd9,#103783,#9bafd9,#103783);
background-size:800% 800%;

animation:bgMove 15s ease infinite;
}

@keyframes bgMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

/* HEADER */

h1{
text-align:center;
color:white;
margin-bottom:35px;
font-size:30px;
animation:fadeDown 0.8s ease;
}

@keyframes fadeDown{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* STATISTIK */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.stat{

background:white;
padding:20px 30px;
border-radius:14px;
font-weight:600;
box-shadow:0 10px 30px rgba(0,0,0,0.15);

animation:fadeUp 0.6s ease;

}

.stat:nth-child(1){color:#000000;}
.stat:nth-child(2){color:#000000;}
.stat:nth-child(3){color:#000000;}

/* SEARCH */

.search{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.search input{

width:320px;
padding:12px;
border-radius:10px;
border:none;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

/* FILTER */

.filters{

display:flex;
justify-content:center;
gap:10px;
margin-bottom:25px;

}

.filters button{

padding:9px 16px;
border:none;
border-radius:10px;
background:white;
cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

transition:0.2s;

}

.filters button:hover{

transform:scale(1.07);
background:#f1f5f9;

}

/* HAPUS SEMUA */

.topbtn{

display:flex;
justify-content:center;
margin-bottom:30px;

}

.deleteAll{

background:#ef4444;
border:none;
color:white;
padding:10px 18px;
border-radius:10px;
cursor:pointer;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

transition:0.2s;

}

.deleteAll:hover{
transform:scale(1.08);
}

/* CONTAINER */

.container{
max-width:720px;
margin:auto;
}

/* CARD */

.card{

background:white;
padding:22px;
border-radius:16px;
margin-bottom:18px;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

animation:fadeUp 0.5s ease;

transition:0.25s;

}

.card:hover{

transform:translateY(-6px) scale(1.02);

}

/* TANGGAL */

.tanggal{

font-size:13px;
color:#64748b;
margin-bottom:6px;

}

/* TAG */

.jenis{

display:inline-block;
padding:4px 12px;
border-radius:20px;
font-size:12px;
margin-bottom:10px;

}

.saran{

background:#dcfce7;
color:#16a34a;

}

.keluhan{

background:#fee2e2;
color:#dc2626;

}

/* PESAN */

.pesan{

margin-bottom:12px;
line-height:1.5;
font-size:15px;

}

/* BUTTON */

.copy{

background:#3b82f6;
border:none;
color:white;
padding:7px 14px;
border-radius:8px;
cursor:pointer;

transition:0.2s;

}

.copy:hover{

transform:scale(1.08);

}

/* ANIMATION */

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>
</head>

<body>
<div class="header">

<h1 class="judul">Dashboard Aspirasi OSIS</h1>

<img src="https://i.pinimg.com/736x/0d/31/b9/0d31b93e53357a17daac1d59cfa870fc.jpg" class="logo-osis">

</div>
<style>/* HEADER */

.header{
position:relative;
margin-bottom:40px;
}

/* JUDUL TENGAH */

.judul{
text-align:center;
color:white;
font-size:34px;
margin:0;
}

/* LOGO OSIS POJOK KANAN */

.logo-osis{

position:absolute;
right:0;
top:0;

width:75px;
height:95px;

border-radius:9px;

object-fit:cover;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

animation:logoMasuk 0.8s ease;

}

/* animasi */

@keyframes logoMasuk{

from{
opacity:0;
transform:translateX(20px);
}

to{
opacity:1;
transform:translateX(0);
}

}</style>

<div class="stats">

<div class="stat">Total : <span id="total">0</span></div>
<div class="stat">Saran : <span id="saran">0</span></div>
<div class="stat">Keluhan : <span id="keluhan">0</span></div>

</div>

<div class="search">
<input type="text" id="search" placeholder="Cari aspirasi...">
</div>

<div class="filters">
<button onclick="filterJenis('all')">Semua</button>
<button onclick="filterJenis('Saran')">Saran</button>
<button onclick="filterJenis('Keluhan')">Keluhan</button>
</div>

<div class="topbtn">
<button onclick="hapusSemua()" class="deleteAll">
Hapus Semua Aspirasi
</button>
</div>

<div class="container" id="list"></div>

<script>

if(localStorage.getItem("adminLogin")!=="true"){
window.location.href="login.html";
}

const url="https://script.google.com/macros/s/AKfycbz423LIrPISp4nnH4HYu1_Ry40cSO5RKeuWwac1odnOSOvxKWyhxx3iyVGlUzBtduF9/exec";

let semuaData=[];

function formatTanggal(tanggal){

let t=new Date(tanggal);

let bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

let hari=t.getDate();
let namaBulan=bulan[t.getMonth()];
let tahun=t.getFullYear();

let jam=String(t.getHours()).padStart(2,"0");
let menit=String(t.getMinutes()).padStart(2,"0");

return hari+" "+namaBulan+" "+tahun+" • "+jam+":"+menit;

}

fetch(url)
.then(res=>res.json())
.then(data=>{

semuaData=data.reverse();
renderData(semuaData);
hitungStatistik();

});

function renderData(data){

let list=document.getElementById("list");
list.innerHTML="";

data.forEach(row=>{

let jenisClass=row[1]=="Keluhan"?"keluhan":"saran";

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="tanggal">${formatTanggal(row[0])}</div>

<div class="jenis ${jenisClass}">
${row[1]}
</div>

<div class="pesan">
${row[2]}
</div>

<button class="copy" onclick="copyText('${row[2]}')">
Salin
</button>

`;

list.appendChild(card);

});

}

function hitungStatistik(){

let saran=0;
let keluhan=0;

semuaData.forEach(row=>{

if(row[1]=="Saran") saran++;
if(row[1]=="Keluhan") keluhan++;

});

document.getElementById("total").innerText=semuaData.length;
document.getElementById("saran").innerText=saran;
document.getElementById("keluhan").innerText=keluhan;

}

function filterJenis(jenis){

if(jenis=="all"){
renderData(semuaData);
return;
}

let hasil=semuaData.filter(row=>row[1]==jenis);
renderData(hasil);

}

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase();

let hasil=semuaData.filter(row=>
row[2].toLowerCase().includes(keyword)
);

renderData(hasil);

});

function copyText(text){

navigator.clipboard.writeText(text);
alert("Aspirasi disalin");

}

function hapusSemua(){

if(confirm("Hapus semua aspirasi?")){

fetch(url+"?deleteAll=true")
.then(()=>{

alert("Semua aspirasi dihapus");
location.reload();

});

}

}

</script>

</body>
</html>
